server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Явный fallback на index.html для любого пути — стандартная практика для SPA.
    # Наше приложение не использует client-side роутинг (все "вкладки" — состояние внутри React,
    # не отдельные URL), но это не помешает и защищает от 404 на прямых заходах на /, /assets и т.д.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статику с хешем в имени можно кэшировать надолго — Vite меняет имя файла при каждом изменении содержимого.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
